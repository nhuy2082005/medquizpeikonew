<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Làm quiz Nội bệnh lý</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="quiz-play-body">

  <main class="play-page">

    <header class="play-header">
      <button class="back-btn" onclick="goBack()">← Quay lại</button>

      <div class="play-title">
        <p id="quizSubject">Nội bệnh lý</p>
        <h1 id="quizTitle">Tên bài quiz</h1>
      </div>

      <div class="score-pill">
        Đúng: <span id="scoreText">0</span>
      </div>
    </header>

    <section id="quizStage" class="play-stage">

      <div id="modeBox" class="feedback-box">
        <h3>Chọn chế độ làm quiz</h3>

        <div class="play-actions">
          <button class="primary-btn" onclick="startQuiz(false)">
            Làm theo thứ tự có sẵn
          </button>

          <button class="primary-btn" onclick="startQuiz(true)">
            Random câu hỏi
          </button>
        </div>
      </div>

      <div id="quizContent" style="display: none;">

        <div class="question-counter">
          <span id="currentNumber">1</span> / <span id="totalNumber">0</span>
        </div>

        <div class="question-board">
          <h2 id="questionText">Câu hỏi</h2>
        </div>

        <div class="answer-grid">
          <button class="play-answer color-a" onclick="chooseAnswer('A')">
            <span>A</span>
            <p id="answerA"></p>
          </button>

          <button class="play-answer color-b" onclick="chooseAnswer('B')">
            <span>B</span>
            <p id="answerB"></p>
          </button>

          <button class="play-answer color-c" onclick="chooseAnswer('C')">
            <span>C</span>
            <p id="answerC"></p>
          </button>

          <button class="play-answer color-d" onclick="chooseAnswer('D')">
            <span>D</span>
            <p id="answerD"></p>
          </button>
        </div>

        <div id="feedbackBox" class="feedback-box"></div>

        <div class="play-actions">
          <button class="primary-btn" id="nextBtn" onclick="nextQuestion()" disabled>
            Câu tiếp theo
          </button>
        </div>

        <div class="question-nav-box">
          <p class="question-nav-title">Bảng số câu hỏi</p>
          <div id="questionNav" class="question-nav"></div>
        </div>

      </div>

    </section>

  </main>

  <script src="noi-quiz.js"></script>
</body>
</html>
